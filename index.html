<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dublikata Store | Dublikata Studio</title>
    <link rel="stylesheet" href="style.css">
<style>

@font-face {
    font-family: 'Inter';
    src: url('./fonts/Inter.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
}

</style>
<body>

<header>
    <div class="header-container">
        <div class="logo-container">
            <img src="dubnew22.png" alt="Dublikata Store" style="width: 32px; height: 32px; border-radius: 8px;">
            <div class="logo-text">Dublikata Store</div>
        </div>
    </div>
</header>

    <main style="margin-top: 150px; text-align: center;">
        <h1 class="line-one">Добро пожаловать в</h1>
        <h2 class="line-two">Dublikata Store</h2>
        
        <a href="#apps" class="btn-get">Начать просмотр</a>

        <section class="features" id="apps">
            <div class="card">
                <h3>DubliBrowse</h3>
                <p>Наш флагманский браузер с поддержкой капсульных UI элементов.</p>
                <a href="" class="slide-btn" style="background: #007aff; color: #fff;">Пред-Заказ</a>
            </div>
        </section>
    </main>

<footer class="studio-footer">
    <div class="footer-content">
        <p>© 2026 Dublikata Store. All rights reserved.</p>
        <p class="brand">Design by <span class="studio-name">Dublikata Studio</span></p>
    </div>
</footer>

</html>
